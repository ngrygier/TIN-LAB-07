<!DOCTYPE html>
<html lang="pl">
<head>

    <meta charset="UTF-8">

    <title>Mini Pixel Art Editor</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;

            display: flex;
            flex-direction: column;
            align-items: center;

            gap: 15px;

            margin-top: 20px;
        }

        #toolbar{

            background: white;

            padding: 10px 15px;

            border-radius: 10px;

            box-shadow: 0 4px 10px rgba(0,0,0,0.1);

            display: flex;
            flex-wrap: wrap;

            gap: 10px;

            align-items: center;
            justify-content: center;
        }

        #toolbar button,
        #toolbar input,
        #toolbar select{

            padding: 6px 10px;

            border-radius: 6px;

            border: 1px solid #ccc;

            cursor: pointer;

            background: white;
        }

        #toolbar button:hover{

            background-color: #e0e0e0;
        }

        #grid{

            display: grid;

            grid-template-columns: repeat(16, 30px);

            grid-template-rows: repeat(16, 30px);

            gap: 2px;

            background-color: #ccc;

            padding: 5px;

            border-radius: 10px;
        }

        .cell{

            width: 30px;

            height: 30px;

            background-color: white;

            border: 1px solid #999;

            transition: 0.2s;
        }

        .cell:hover{

            filter: brightness(0.85);

            cursor: pointer;
        }

        #info{

            background: white;

            padding: 8px 12px;

            border-radius: 8px;

            box-shadow: 0 2px 6px rgba(0,0,0,0.08);

            display: flex;

            gap: 15px;
        }

        #status{

            font-weight: bold;

            color: darkblue;
        }
        #palette-container{

            display: flex;

            gap: 10px;

            flex-wrap: wrap;

            justify-content: center;
        }



        .palette-color{

            width: 40px;

            height: 40px;

            border-radius: 8px;

            border: 2px solid black;

            cursor: pointer;

            transition: 0.2s;
        }



        .palette-color:hover{

            transform: scale(1.1);
        }

    </style>

</head>

<body>

<div id="toolbar">

    <input type="color" id="color-picker" value="#000000">

    <select id="brush-size">

        <option value="1">1x1</option>

        <option value="2">2x2</option>

        <option value="3">3x3</option>

    </select>

    <button id="erase-button">
        Gumka
    </button>

    <button id="clear-button">
        Wyczyść
    </button>

    <button id="save-button">
        Zapisz
    </button>

    <button id="load-button">
        Wczytaj
    </button>

    <button id="paleta1">
        Paleta 1
    </button>

    <button id="paleta2">
        Paleta 2
    </button>

    <button id="paleta3">
        Paleta 3
    </button>

    <button id="parallel-button">
        Ładowanie równoległe
    </button>

    <button id="sequential-button">
        Ładowanie sekwencyjne
    </button>

</div>
<div id="palette-container"></div>

<div id="info">

<span id="info-row">
    Row: -
</span>

    <span id="info-col">
    Col: -
</span>

    <span id="info-count">
    0
</span>

    <span id="status">
    Gotowe
</span>

</div>


<div id="grid"></div>


<script src="index.js"></script>

</body>
</html>
