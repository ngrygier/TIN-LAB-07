<!DOCTYPE html>
<html lang="pl">
<head>

    <meta charset="UTF-8">

    <title>Mini Pixel Art Editor</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;

            display: flex;
            flex-direction: column;
            align-items: center;

            gap: 15px;

            margin-top: 20px;
        }

        #toolbar{

            background: white;

            padding: 10px 15px;

            border-radius: 10px;

            box-shadow: 0 4px 10px rgba(0,0,0,0.1);

            display: flex;
            flex-wrap: wrap;

            gap: 10px;

            align-items: center;
            justify-content: center;
        }

        #toolbar button,
        #toolbar input,
        #toolbar select{

            padding: 6px 10px;

            border-radius: 6px;

            border: 1px solid #ccc;

            cursor: pointer;

            background: white;
        }

        #toolbar button:hover{

            background-color: #e0e0e0;
        }

        #grid{

            display: grid;

            grid-template-columns: repeat(16, 30px);

            grid-template-rows: repeat(16, 30px);

            gap: 2px;

            background-color: #ccc;

            padding: 5px;

            border-radius: 10px;
        }

        .cell{

            width: 30px;

            height: 30px;

            background-color: white;

            border: 1px solid #999;

            transition: 0.2s;
        }

        .cell:hover{

            filter: brightness(0.85);

            cursor: pointer;
        }

        #info{

            background: white;

            padding: 8px 12px;

            border-radius: 8px;

            box-shadow: 0 2px 6px rgba(0,0,0,0.08);

            display: flex;

            gap: 15px;
        }

        #status{

            font-weight: bold;

            color: darkblue;
        }

    </style>

</head>

<body>

<div id="toolbar">

    <input type="color" id="color-picker" value="#000000">

    <select id="brush-size">

        <option value="1">1x1</option>

        <option value="2">2x2</option>

        <option value="3">3x3</option>

    </select>

    <button id="erase-button">
        Gumka
    </button>

    <button id="clear-button">
        Wyczyść
    </button>

    <button id="save-button">
        Zapisz
    </button>

    <button id="load-button">
        Wczytaj
    </button>

    <button id="palette1">
        Paleta 1
    </button>

    <button id="palette2">
        Paleta 2
    </button>

    <button id="palette3">
        Paleta 3
    </button>

    <button id="parallel-button">
        Ładowanie równoległe
    </button>

    <button id="sequential-button">
        Ładowanie sekwencyjne
    </button>

</div>


<div id="info">

<span id="info-row">
    Row: -
</span>

    <span id="info-col">
    Col: -
</span>

    <span id="info-count">
    0
</span>

    <span id="status">
    Gotowe
</span>

</div>


<div id="grid"></div>


<script>

    const grid =
        document.getElementById("grid");

    const colorPicker =
        document.getElementById("color-picker");

    const eraseButton =
        document.getElementById("erase-button");

    const clearButton =
        document.getElementById("clear-button");

    const brushSize =
        document.getElementById("brush-size");

    const infoCount =
        document.getElementById("info-count");

    const infoRow =
        document.getElementById("info-row");

    const infoCol =
        document.getElementById("info-col");

    const statusText =
        document.getElementById("status");



    let currentColor = "#000000";

    let eraseMode = false;

    let isDrawing = false;

    let debounceTimeout;



    // AUTO SAVE (DEBOUNCE)


    function autoSave(){

        statusText.textContent =
            "Auto zapis...";

        clearTimeout(debounceTimeout);
        // usuwa poprzedni timer - dzięki temu szybkie kliknięcia nie wykonują wielu zapisów

        debounceTimeout = setTimeout(() => {

            const state =
                getGridState();

            localStorage.setItem(
                "pixel-art-state",
                JSON.stringify(state)
            );

            statusText.textContent =
                "Auto zapisano";

        }, 1000);
        // zapis wykona się dopiero gdy użytkownik przestanie klikać na 1 sekundę

    }




    // TWORZENIE SIATKI


    for(let i = 0; i < 16; i++){

        for(let j = 0; j < 16; j++){

            const cell =
                document.createElement("div");

            cell.classList.add("cell");

            cell.dataset.row = i;

            cell.dataset.col = j;

            grid.appendChild(cell);
        }
    }




    // LICZENIE POKOLOROWANYCH PÓL


    function updatePaintedCount(){

        const cells =
            document.querySelectorAll(".cell");

        let count = 0;

        cells.forEach((cell) => {

            const color =
                getComputedStyle(cell)
                    .backgroundColor;

            if(
                color !==
                "rgb(255, 255, 255)"
            ){

                count++;
            }
        });

        infoCount.textContent = count;
    }




    // KOLOROWANIE


    function colorCell(cell){

        if(!cell) return;

        if(eraseMode){

            cell.style.backgroundColor =
                "white";

        }else{

            cell.style.backgroundColor =
                currentColor;
        }

        updatePaintedCount();

        autoSave();
    }




    // PĘDZEL


    function paintBrush(row, col){

        const size =
            parseInt(brushSize.value);

        for(let i = 0; i < size; i++){

            for(let j = 0; j < size; j++){

                const targetCell =
                    document.querySelector(
                        `.cell[data-row="${row+i}"][data-col="${col+j}"]`
                    );

                colorCell(targetCell);
            }
        }
    }




    // DELEGACJA ZDARZEŃ
    // zamiast dodawać event listener do każdej komórki osobno, nasłuchujemy na całej siatce


    grid.addEventListener(
        "mousedown",
        (e) => {

            if(
                !e.target.classList.contains("cell")
            ) return;

            isDrawing = true;

            const row =
                Number(e.target.dataset.row);

            const col =
                Number(e.target.dataset.col);

            infoRow.textContent =
                `Row: ${row}`;

            infoCol.textContent =
                `Col: ${col}`;

            paintBrush(row, col);
        }
    );



    grid.addEventListener(
        "mouseover",
        (e) => {

            if(!isDrawing) return;

            if(
                !e.target.classList.contains("cell")
            ) return;

            const row =
                Number(e.target.dataset.row);

            const col =
                Number(e.target.dataset.col);

            paintBrush(row, col);
        }
    );



    document.addEventListener(
        "mouseup",
        () => {

            isDrawing = false;
        }
    );




    // COLOR PICKER


    colorPicker.addEventListener(
        "input",
        (e) => {

            currentColor =
                e.target.value;

            eraseMode = false;
        }
    );




    // GUMKA


    eraseButton.addEventListener(
        "click",
        () => {

            eraseMode = !eraseMode;
        }
    );




    // WYCZYŚĆ


    clearButton.addEventListener(
        "click",
        () => {

            const cells =
                document.querySelectorAll(".cell");

            cells.forEach((cell) => {

                cell.style.backgroundColor =
                    "white";
            });

            updatePaintedCount();

            autoSave();
        }
    );




    // SKRÓTY KLAWIATUROWE


    document.addEventListener(
        "keydown",
        (e) => {

            if(e.key === "c"){

                clearButton.click();
            }

            if(e.key === "e"){

                eraseMode = !eraseMode;
            }

            if(e.key === "1"){

                brushSize.value = "1";
            }

            if(e.key === "2"){

                brushSize.value = "2";
            }

            if(e.key === "3"){

                brushSize.value = "3";
            }
        }
    );




    // POBRANIE STANU SIATKI


    function getGridState(){
        // funkcja ma zwrócić listę kolorów wszystkich komórek w odpowiedniej kolejności

        const cells =
            document.querySelectorAll(".cell"); // pobranie wszystkich elementów oznaczonych cell

        const state = []; // pusta tablica do dodawania kolorów

        cells.forEach((cell) => {

            state.push( // dodaje kolor komórki do tablicy
                getComputedStyle(cell) // getComputedStyle pobiera finalne style elementu
                                       // czyli juz po przeliczeniu przez przeglądarkę
                    .backgroundColor   // pobiera kolor komórki
            );
        });

        return state;
    }




    // POBIERANIE PALET
    // pobieranie danych użytkownika z api za pomocą async/await

    async function loadPalette(id){ // funkcja asynchroniczna nie wykonuje się natychmiast
        // id to identyfikator użytkownika którego dane będzie pobierała funkcja

        try{

            statusText.textContent =
                "Ładowanie palety...";

            const response = // obiekt odpowiedzi http
                await fetch( // wysyła do serwera zapytanie http o dane z adresu
                             // i czeka na odpowiedź
                    `https://jsonplaceholder.typicode.com/users/${id}`
                );

            // sprawdzamy czy HTTP zakończył się sukcesem

            if(!response.ok){ // jeżeli odpowiedź nie zwróciła statuus ok (404, 500)

                throw new Error(
                    "Błąd HTTP"
                );
            }

            const data =
                await response.json(); // zwróć json



            // generowanie koloru
            // na podstawie id użytkownika

            const generatedColor =
                "#" +
                (data.id * 2137)
                    .toString(16) // konwersja na HEX - tak są zapisywane kolory w CSS
                    .slice(0,6); // bierze pierwsze 6 znaków

            currentColor =
                generatedColor;

            colorPicker.value =
                generatedColor;

            statusText.textContent =
                "Paleta załadowana";
        }

        catch(error){

            statusText.textContent =
                "Błąd pobierania palety";

            console.log(error);
        }
    }




    // PRZYCISKI PALET


    document.getElementById("palette1")
        .addEventListener(
            "click",
            () => {

                loadPalette(1);
            }
        );


    document.getElementById("palette2")
        .addEventListener(
            "click",
            () => {

                loadPalette(2);
            }
        );


    document.getElementById("palette3")
        .addEventListener(
            "click",
            () => {

                loadPalette(3);
            }
        );




    // ZAPIS
    // async / await


    async function saveGrid(){

        const gridState =
            getGridState();



        // zapis do localStorage

        localStorage.setItem(
            "pixel-art-state",
            JSON.stringify(gridState)
        );



        // fetch POST
        // mock API nie zapisuje danych trwale
        // to tylko ćwiczenie obsługi HTTP

        try{

            const response =
                await fetch(
                    "https://jsonplaceholder.typicode.com/posts",
                    {

                        method: "POST",

                        headers: {

                            "Content-Type":
                                "application/json" // zapisujemy jako json
                        },

                        body: JSON.stringify({

                            grid: gridState // zamiana grid state na stringa, którego czyta json
                        })
                    }
                );

            if(!response.ok){

                throw new Error(
                    "Błąd zapisu"
                );
            }

            await response.json();

            statusText.textContent =
                "Zapisano";
        }

        catch(error){

            statusText.textContent =
                "Błąd zapisu";

            console.log(error);
        }
    }




    // WCZYTYWANIE
    // then + catch


    function loadGrid(){

        fetch(
            "https://jsonplaceholder.typicode.com/posts/1"
        )

            .then((response) => {

                if(!response.ok){

                    throw new Error(
                        "Błąd HTTP"
                    );
                }

                return response.json();
            })

            .then(() => {

                const savedState =
                    JSON.parse(
                        localStorage.getItem( // pobieranie danych z pamięci przeglądarki
                            "pixel-art-state"
                        )
                    );

                if(!savedState) return;

                const cells =
                    document.querySelectorAll(".cell");

                cells.forEach((cell, index) => {

                    cell.style.backgroundColor =
                        savedState[index];
                });

                updatePaintedCount();

                statusText.textContent =
                    "Wczytano";
            })

            .catch((error) => {

                statusText.textContent =
                    "Błąd wczytywania";

                console.log(error);
            });
    }




    // PRZYCISKI SAVE / LOAD


    document.getElementById("save-button")
        .addEventListener(
            "click",
            saveGrid
        );


    document.getElementById("load-button")
        .addEventListener(
            "click",
            loadGrid
        );




    // ŁADOWANIE RÓWNOLEGŁE
    // wykonywane jednocześnie


    async function loadParallel(){

        const start =
            performance.now(); // zwraca bardzo dokładny czas do mierzenia wydajności

        await Promise.all([ // wszystkie promise wykonują się w tym samym czasie

            loadPalette(1),
            loadPalette(2),
            loadPalette(3)

        ]);

        const end =
            performance.now();

        alert(
            `Równoległe:
${Math.round(end-start)} ms`
        );
    }




    // ŁADOWANIE SEKWENCYJNE


    async function loadSequential(){

        const start =
            performance.now();

        await loadPalette(1); // każde promise ładuje się po kolei

        await loadPalette(2);

        await loadPalette(3);

        const end =
            performance.now();

        alert(
            `Sekwencyjne:
${Math.round(end-start)} ms`
        );
    }




    // BUTTONY ŁADOWANIA


    document.getElementById(
        "parallel-button"
    )

        .addEventListener(
            "click",
            loadParallel
        );



    document.getElementById(
        "sequential-button"
    )

        .addEventListener(
            "click",
            loadSequential
        );

</script>

</body>
</html>
